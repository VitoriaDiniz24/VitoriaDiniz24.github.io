<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sabores de hamburguer - Tasty!</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    
    <button id="temaBtn">Modo Escuro</button>
    
    <img class="logo" src="../img/Logo.png" alt="Logo da Tasty!" width="150">

    <nav>
        <ul>
            <li class="opcoes"><a href="../html/login.html">Login</a></li>
            <li class="opcoes"><a href="../html/cardapio.html">Inicio</a></li>
            <li class="opcoes"><a href="../html/sobre.html">Sobre</a></li>
            <li class="opcoes"><a href="../html/contato.html">Contato</a></li>
            <li class="opcoes"><a href="../html/carrinho.html">Carrinho</a></li>
        </ul>
    </nav>
    

        <h1>Escolha o sabor do seu hamburguer</h1>

<ul class="sabores">
  <li class="item-sabor" data-nome="Cheeseburguer" data-preco="25.90"
    data-ingredientes="Pão brioche, Hambúrguer 120g, Queijo cheddar, Maionese especial">
    Cheeseburger R$25,90
  </li>

  <li class="item-sabor" data-nome="Hambúrguer com bacon" data-preco="28.90"
    data-ingredientes="Pão brioche, Hambúrguer 150g, Bacon crocante, Queijo cheddar, Molho barbecue">
    Hambúrguer com bacon R$28,90
  </li>

  <li class="item-sabor" data-nome="Vegetariano" data-preco="26.90"
    data-ingredientes="Pão integral, Hambúrguer de grão-de-bico, Alface, Tomate, Maionese vegana">
    Vegetariano R$26,90
  </li>

  <li class="item-sabor" data-nome="Duplo carne" data-preco="32.90"
    data-ingredientes="Pão brioche, Dois hambúrgueres 150g, Queijo prato, Molho especial">
    Duplo carne R$32,90
  </li>
</ul>


    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="titulo-sabor"></h2>
            <p id="ingredientes"></p>
            <p><strong>Preço:</strong> R$ <span id="preco-sabor"></span></p>
            <button id="btnCarrinhoModal">Adicionar ao Carrinho</button>
     
        </div>
    
    <footer>
        <p>&copy; 2025 Tasty! - Todos os direitos reservados</p>
    </footer>

    <script src="../script/carrinho.js"></script>
    <script>
        // Abrir modal ao clicar no sabor
        document.querySelectorAll(".item-sabor").forEach(item => {
            item.addEventListener("click", () => {
                const nome = item.dataset.nome;
                const preco = item.dataset.preco;
                const ingredientes = item.dataset.ingredientes;

                document.getElementById("titulo-sabor").textContent = nome;
                document.getElementById("ingredientes").textContent = ingredientes;
                document.getElementById("preco-sabor").textContent = preco;

                document.getElementById("modal").classList.remove("hidden");

                document.getElementById("btnCarrinhoModal").onclick = () => {
                    adicionarAoCarrinho(nome, parseFloat(preco));
                    fecharModal();
                };
            });
        });

        function fecharModal() {
            document.getElementById("modal").classList.add("hidden");
        }
    </script>
    <script src="../script/script.js"></script>


</body>

</html>
