<!DOCTYPE html>
<html lang="pt-BR">

<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <button id="temaBtn">Modo Escuro</button>

    <img class="logo" src="../img/Logo.png" alt="Logo da Tasty!" width="150">

    <nav>

        <ul>
            <li class="opcoes"><a href="../html/login.html">Login</a></li>
            <li class="opcoes"><a href="../html/cardapio.html">Inicio</a></li>
            <li class="opcoes"><a href="../html/sobre.html">Sobre</a></li>
            <li class="opcoes"><a href="../html/contato.html">Contato</a></li>
            <li class="opcoes"><a href="../html/carrinho.html">Carrinho</a></li>
        </ul>

    </nav>

    <header>
        <h1>Meu Carrinho</h1>
    </header>

    <main class="carrinho-container">

        <ul id="lista-carrinho"></ul>

        <p class="total">
            Total: R$ <span id="total-carrinho">0,00</span>
        </p>

        <button id="limpar-carrinho">Limpar Carrinho</button>
        <button id="finalizar-pedido">Finalizar Pedido</button>

    </main>

    <div id="secao-pagamento">

        <h3>Escolha a Forma de Pagamento</h3>

        <label>
            <input type="radio" name="formaPagamento" value="PIX" checked onclick="esconderTroco()">
            PIX
        </label><br>

        <label>
            <input type="radio" name="formaPagamento" value="CartaoCredito" onclick="esconderTroco()">
            Cartão de Crédito
        </label><br>

        <label>
            <input type="radio" name="formaPagamento" value="Dinheiro" id="radioDinheiro" onclick="mostrarTroco()">
            Dinheiro
        </label>

        <div id="campo-troco" style="display:none; margin-top: 10px; padding: 10px; border: 1px dashed #ccc;">
            <label for="valorPago">Valor para Pagamento (R$):</label>
            <input type="number" id="valorPago" step="0.01" min="0" placeholder="Ex: 50.00">
        </div>
    </div>

    <script src="../script/carrinho.js"></script>
    <script src="../script/script.js"></script>

    <footer>
        <p>&copy; 2025 Tasty! - Todos os direitos reservados</p>
    </footer>
    
</body>

</html>
